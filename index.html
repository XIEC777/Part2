<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <title>xiec 的 blog</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="page-home">
  <!-- Header -->
  <header class="header">
    <div class="header__left">
      <a href="./index.html" class="header__logo">
        <img src="./images/logo.png" alt="XIEC" class="header__logoImg" />
      </a>

    <nav class="header__nav">
      <a href="#" class="header__navLink is-active">主页</a>

  <div class="flow-bg">

      <div class="hero__brand">hello</div>
